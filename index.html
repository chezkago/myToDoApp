<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <p>⊹₊˚‧︵‿₊୨ᰔ୧₊‿︵‧˚₊⊹</p>
        <h1 style="text-align: center;">My To-Do List</h1>
        <p>⊹₊˚‧︵‿₊୨ᰔ୧₊‿︵‧˚₊⊹</p>

        <div class="input-area">
            <input type="text" id="task-input" placeholder="Add new task...">
            <button id="add-btn">Add</button>
        </div>

        <ul id="task-list"></ul>
        <p id="warning-label">WARNING: Tasks will not save after leaving webpage</p>
    </div>
    
    <div id="modal" class="modal-overlay">
      <div class="modal-box">
        <img id="modal-img" src="unicorn.jpg" alt="Task complete!">
        <p>Task complete! 🎉</p>
        <button id="modal-close">OK</button>
      </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
